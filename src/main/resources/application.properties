spring.application.name=booka
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:booka}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=${MYSQL_STRATEGY:update}
server.port=${SERVER_PORT:9090}
# News API
news.api.key=${NEWS_API_KEY}
# JWT
jwt.secret=${JWT_SECRET:se-cambiara-clave-desarrollo-prueba-1234567890}
jwt.expirationMs=${JWT_EXPIRATION:86400000}
# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.path=C:/booka/uploads/
upload.profile.folder=C:/booka/uploads/profiles/